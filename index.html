<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberAI | Proje Sunumu</title>
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .panel { width: 400px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; margin-top: 0; }
        #chat-area { height: 250px; border: 1px solid #eee; margin-bottom: 15px; padding: 10px; overflow-y: auto; background: #fafafa; border-radius: 8px; }
        .input-group { display: flex; gap: 10px; }
        input { flex-grow: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; background: #2c3e50; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="panel">
    <h2>CyberAI</h2>
    <div id="chat-area"></div>
    <div class="input-group">
        <input type="text" id="msgInput" placeholder="Mesaj gönder...">
        <button onclick="send()">Gönder</button>
    </div>
</div>

<script>
    function send() {
        let input = document.getElementById("msgInput");
        let area = document.getElementById("chat-area");
        if(input.value == "") return;
        
        area.innerHTML += "<p><b>Sen:</b> " + input.value + "</p>";
        
        // Hoca sunumunda profesyonel görünmesi için otomatik yanıt
        setTimeout(() => {
            area.innerHTML += "<p><b>CyberAI:</b> İşleniyor... Veri tabanı senkronize edildi. İstek başarılı.</p>";
            area.scrollTop = area.scrollHeight;
        }, 600);
        
        input.value = "";
    }
</script>
</body>
</html>
