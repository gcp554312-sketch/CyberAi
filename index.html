<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>CyberAI | Entegrasyon Projesi</title>
    <style>
        body { background: #121212; color: #00ffcc; font-family: 'Courier New', monospace; padding: 20px; }
        .container { max-width: 800px; margin: auto; border: 1px solid #333; padding: 20px; border-radius: 10px; }
        .log { background: #000; padding: 15px; height: 300px; overflow-y: scroll; border: 1px solid #00ffcc; }
        .input-area { margin-top: 10px; display: flex; }
        input { flex: 1; background: #222; border: 1px solid #00ffcc; color: #fff; padding: 10px; }
        button { background: #00ffcc; color: #000; padding: 10px; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>CyberAI Core v1.0</h1>
        <div class="log" id="log">Sistem başlatıldı...<br>Model yükleniyor...<br>Hazır.</div>
        <div class="input-area">
            <input type="text" id="query" placeholder="Sorgu girin...">
            <button onclick="process()">ÇALIŞTIR</button>
        </div>
    </div>

    <script>
        function process() {
            let q = document.getElementById("query").value;
            let log = document.getElementById("log");
            log.innerHTML += "<br>> Sorgu: " + q;
            log.innerHTML += "<br>-- Processing [GPT-4o Engine] --";
            log.innerHTML += "<br>-- Yanıt: Bu proje, bir API arayüzü olarak yapılandırılmıştır.";
            log.scrollTop = log.scrollHeight;
            document.getElementById("query").value = "";
        }
    </script>
</body>
</html>
